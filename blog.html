<script>
    document.addEventListener("DOMContentLoaded", function() {
        const rssUrl = "https://api.rss2json.com/v1/api.json?rss_url=https://medium.com/feed/@alunindraswari";
        const grid = document.getElementById('blog-grid'); // Sudah diperbaiki
        const searchInput = document.getElementById('searchInput');
        const noResult = document.getElementById('no-result');
        let allPosts = [];

        fetch(rssUrl)
            .then(res => res.json())
            .then(data => {
                if (data.status === 'ok') {
                    allPosts = data.items;
                    renderMediumPosts(allPosts);
                } else {
                    grid.innerHTML = "<p class='text-on-surface'>Gagal mengambil data dari Medium.</p>";
                }
            })
            .catch(err => {
                console.error("Error:", err);
                grid.innerHTML = "<p class='text-on-surface text-center py-10'>Terjadi kesalahan koneksi.</p>";
            });

        function renderMediumPosts(posts) {
            grid.innerHTML = '';
            
            if (posts.length === 0) {
                noResult.classList.remove('hidden');
                return;
            }
            
            noResult.classList.add('hidden');

            posts.forEach(post => {
                const content = post.content || post.description;
                const imgMatch = content.match(/<img[^>]+src="([^">]+)"/);
                const thumbnail = post.thumbnail || (imgMatch ? imgMatch[1] : 'https://via.placeholder.com/600x400?text=Medium+Article');
                const cleanSummary = content.replace(/<[^>]*>?/gm, '').substring(0, 150) + '...';
                const date = new Date(post.pubDate).toLocaleDateString('id-ID', {
                    year: 'numeric', month: 'long', day: 'numeric'
                });

                const card = `
                    <a href="${post.link}" target="_blank" class="group flex flex-col md:flex-row gap-8 p-6 rounded-3xl border border-outline-variant/30 hover:border-primary/50 bg-surface-container-low transition-all mb-6">
                        <div class="md:w-1/3 aspect-video overflow-hidden rounded-2xl">
                            <img src="${thumbnail}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="Thumbnail">
                        </div>
                        <div class="md:w-2/3 flex flex-col justify-center">
                            <span class="text-primary font-label text-[0.6875rem] tracking-[0.1rem] uppercase mb-2 block">
                                Medium • ${date}
                            </span>
                            <h3 class="text-2xl font-bold mb-3 text-on-surface group-hover:text-primary transition-colors">
                                ${post.title}
                            </h3>
                            <p class="text-on-surface-variant text-sm leading-relaxed mb-6">
                                ${cleanSummary}
                            </p>
                            <div class="flex items-center gap-2 text-primary font-bold text-sm tracking-wider uppercase">
                                <span>Read_on_Medium</span>
                                <span class="material-symbols-outlined group-hover:translate-x-2 transition-transform">arrow_right_alt</span>
                            </div>
                        </div>
                    </a>
                `;
                grid.innerHTML += card;
            });
        }

        // Logika Pencarian
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredPosts = allPosts.filter(post => 
                post.title.toLowerCase().includes(searchTerm) || 
                post.description.toLowerCase().includes(searchTerm)
            );
            renderMediumPosts(filteredPosts);
        });
    });
</script>
